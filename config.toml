# tidx — `${VAR}` is expanded from the process env at load time. Escape with `$${VAR}`.

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "mainnet"
chain_id = 1
rpc_url = "${TIDX_RPC_URL_MAINNET}"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_mainnet"
backfill = true
batch_size = 500
concurrency = 8

# ClickHouse OLAP engine (optional)
# Data is written directly via HTTP batch inserts (JSONEachRow).
# Queries go to the primary; failover instances are tried on connection failure.
[chains.clickhouse]
enabled = false
url = "http://clickhouse:8123"
# failover_urls = ["http://clickhouse-2:8123"]
# user = "default"
# password_env = "CH_PASSWORD"

# ENS reverse-resolution enrichment (opt-in per request via `?ens=true`).
[chains.ens]
enabled = true
# registry = "0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e"  # default, mainnet ENS Registry
# stale_after_secs = 86400                                # default 24h cache TTL

[[chains]]
name = "sepolia"
chain_id = 11155111
rpc_url = "${TIDX_RPC_URL_SEPOLIA}"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_sepolia"
backfill = true
batch_size = 500
concurrency = 8

# ClickHouse OLAP engine (optional)
[chains.clickhouse]
enabled = false
url = "http://clickhouse:8123"
# failover_urls = ["http://clickhouse-2:8123"]
# user = "default"
# password_env = "CH_PASSWORD"
