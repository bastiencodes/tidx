# tidx — `${VAR}` is expanded from the process env at load time. Escape with `$${VAR}`.

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "moderato"
chain_id = 42431
rpc_url = "${TIDX_RPC_URL_MODERATO}"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_moderato"
backfill = true
batch_size = 500
concurrency = 8

[chains.clickhouse]
enabled = false
url = "http://clickhouse:8123"

[[chains]]
name = "mainnet"
chain_id = 4217
rpc_url = "${TIDX_RPC_URL_MAINNET}"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_mainnet"
backfill = true
batch_size = 500
concurrency = 8

[chains.clickhouse]
enabled = false
url = "http://clickhouse:8123"
