name: Verify

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: make check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tidx
          POSTGRES_PASSWORD: tidx
          POSTGRES_DB: tidx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tidx -d tidx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Tempo node
        run: |
          docker run -d --name tempo -p 8545:8545 \
            ghcr.io/tempoxyz/tempo:latest \
            node --dev --http --http.addr 0.0.0.0 --http.port 8545
          for i in {1..30}; do
            curl -sf http://localhost:8545 && break || sleep 2
          done

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        env:
          DATABASE_URL: postgres://tidx:tidx@localhost:5432/tidx
          RPC_URL: http://localhost:8545
        run: cargo test -- --test-threads=1 --nocapture
