# TIDX Indexer Configuration
#
# `${VAR}` references are expanded from the process environment at config load
# time. Env vars are loaded via docker-compose `env_file` (see `.env.example`).

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "mainnet"
chain_id = 1
rpc_url = "${TIDX_RPC_URL_MAINNET}"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_mainnet"
backfill = true
batch_size = 100

# ClickHouse OLAP engine (optional)
[chains.clickhouse]
enabled = true
url = "http://clickhouse:8123"

[[chains]]
name = "sepolia"
chain_id = 11155111
rpc_url = "${TIDX_RPC_URL_SEPOLIA}"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_sepolia"
backfill = true
batch_size = 100

# ClickHouse OLAP engine (optional)
[chains.clickhouse]
enabled = true
url = "http://clickhouse:8123"
